# application.secrets.yaml - API keys and credentials
#
# This file is merged on top of application.yaml at startup.
# Only fields listed here are merged; all other fields come from
# application.yaml unchanged. Endpoint overrides are matched by name.
#
# Use `api_key` to supply the key value directly in this file.
# Use `api_key_env` to name an environment variable that holds the key.
# When both are set, `api_key` takes precedence.
#
# Uncomment and fill in the entries for the providers you use:
#
# endpoints:
#   - name: anthropic
#     api_key: sk-ant-...
#   - name: openai
#     api_key: sk-...
#   - name: openrouter
#     api_key: sk-or-v1-...
